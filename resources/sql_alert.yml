resources:
  queries:
    # 1. You must define the query first
    azure_log_query:
      display_name: "Azure Log Warning Count"
      warehouse_id: ece081f3bd7cb8a7
      query: |
        SELECT count(1) as warning_count 
        FROM dltvijay.source.azure_logs 
        WHERE level = 'Warning'

  alerts:
    # 2. Then you define the alert that watches that query
    legacy_azure_warning_alert:
      display_name: "Legacy Alert: Azure Warnings"
      # This links the alert to the query above
      query_id: ${resources.queries.azure_log_query.id}
      
      parent_path: /Shared/Alerts
      
      options:
        column: "warning_count"
        op: ">="
        value: "6"
        muted: false
      
      # Who gets notified
      subscribers:
        - user_name: "datta.vijay@gmail.com"